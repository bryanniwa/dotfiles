include themes/rose-pine.conf


# BEGIN_KITTY_FONTS
font_family      family='Maple Mono NF' features='+cv64 +cv02'
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

window_padding_width 3 8 3

map ctrl+shift+p>u       kitten hints --type url  --program -
map ctrl+shift+p>shift+u kitten hints --type url  --program @
map ctrl+shift+p>shift+f kitten hints --type path --program @
map ctrl+shift+p>shift+l kitten hints --type line --program @
map ctrl+shift+p>shift+h kitten hints --type hash --program @
map ctrl+shift+p>shift+w kitten hints --type word --program @
